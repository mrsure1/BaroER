<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>[바로응급실] 회원 인증 안내</title>
</head>
<!--
  적용 방법 (호스티드 프로젝트)
  Dashboard → Authentication → Email Templates → "Confirm signup"
  - Subject: 아래 제목 줄(confirm-signup-subject.txt)과 동일하게 복사해 넣거나 수정
  - Body   : 아래 테이블 밖부터 </html> 까지를 HTML 본문에 붙여넣음

  Supabase Go 템플릿 변수:
  {{ .ConfirmationURL }}, {{ .Email }}, {{ .SiteURL }}, {{ .RedirectTo }}
-->

<body style="margin:0;background:#f4f6f8;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;color:#18181b;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="padding:28px 12px;background:#f4f6f8;">
    <tr>
      <td align="center">
        <table role="presentation" cellspacing="0" cellpadding="0" style="max-width:520px;width:100%;background:#ffffff;border-radius:16px;padding:36px 32px;border:1px solid #e7e9ee;">
          <tr>
            <td>
              <p style="margin:0 0 8px;font-size:13px;font-weight:700;letter-spacing:0.06em;color:#2563eb;">바로응급실</p>
              <h1 style="margin:0 0 14px;font-size:22px;line-height:1.35;font-weight:800;color:#0f172a;">이메일을 인증해 주세요</h1>
              <p style="margin:0 0 20px;font-size:15px;line-height:1.65;color:#52525b;">
                아래 버튼을 누르면 <strong>바로응급실</strong> 회원가입 절차가 완료됩니다.<br/>
                이 메일은 <strong>{{ .Email }}</strong> 번호로 회원 이용을 시작하려는 분께만 발송됩니다.
              </p>
              <p style="margin:0 0 26px;text-align:center;">
                <a href="{{ .ConfirmationURL }}"
                   style="display:inline-block;padding:14px 28px;background:#2563eb;color:#ffffff;font-weight:700;font-size:15px;text-decoration:none;border-radius:12px;"
                >바로응급실 · 이메일 인증하기</a>
              </p>
              <p style="margin:0 0 10px;font-size:13px;line-height:1.6;color:#71717a;">
                버튼이 동작하지 않으면 아래 주소를 브라우저 주소창에 그대로 붙여 넣어 주세요.
              </p>
              <p style="margin:0 0 20px;font-size:12px;word-break:break-all;color:#3f3f46;background:#fafafa;padding:12px 14px;border-radius:10px;border:1px solid #ebebef;">
                {{ .ConfirmationURL }}
              </p>
              <hr style="border:none;border-top:1px solid #eceef2;margin:24px 0;" />
              <p style="margin:0;font-size:12px;line-height:1.55;color:#a1a1aa;">
                • 이 안내 메일은 <strong>바로응급실</strong>(주변 응급실 검색 및 출동 업무 도우미) 회원 신청 과정 일부입니다.<br/>
                • 본인이 가입 신청하지 않았다면 이 메일은 무시하셔도 됩니다.
              </p>
            </td>
          </tr>
        </table>
        <p style="margin:18px 0 0;font-size:11px;color:#a3a3a3;">바로응급실 · BaroER</p>
      </td>
    </tr>
  </table>
</body>
</html>
